<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management</title>
  <style>
    :root {
      --primary-color: #4a6bff;
      --secondary-color: #f5f7ff;
      --text-color: #333;
      --light-gray: #f0f0f0;
      --border-color: #ddd;
      --white: #fff;
      --card-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #f9f9f9;
      color: var(--text-color);
    }

    .student-management {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .student-management__header {
      margin-bottom: 20px;
    }

    .student-management__title {
      font-size: 24px;
      margin-bottom: 5px;
      color: var(--primary-color);
    }

    .student-management__subtitle {
      font-size: 16px;
      color: #666;
    }

    .student-management__filters {
      background-color: var(--white);
      padding: 15px;
      border-radius: 8px;
      box-shadow: var(--card-shadow);
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    .student-management__search {
      flex: 1;
      min-width: 250px;
    }

    .student-management__search-input {
      width: 100%;
      padding: 10px 15px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      font-size: 14px;
    }

    .student-management__filter-group {
      display: flex;
      flex-direction: column;
      min-width: 150px;
    }

    .student-management__filter-label {
      font-size: 14px;
      margin-bottom: 5px;
      font-weight: 500;
    }

    .student-management__filter-select {
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      font-size: 14px;
      background-color: var(--white);
    }

    .student-management__reset-btn {
      align-self: flex-end;
      background-color: var(--light-gray);
      border: none;
      padding: 8px 15px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      height: 36px;
    }

    .student-management__reset-btn:hover {
      background-color: #e0e0e0;
    }

    .student-management__controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .student-management__count {
      font-size: 14px;
      color: #666;
    }

    .student-management__view-toggle {
      display: flex;
      gap: 10px;
    }

    .student-management__view-btn {
      padding: 8px 15px;
      background-color: var(--white);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .student-management__view-btn--active {
      background-color: var(--primary-color);
      color: var(--white);
      border-color: var(--primary-color);
    }

    .student-management__table {
      width: 100%;
      border-collapse: collapse;
      background-color: var(--white);
      box-shadow: var(--card-shadow);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .student-management__table th,
    .student-management__table td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    .student-management__table th {
      background-color: var(--secondary-color);
      font-weight: 600;
    }

    .student-management__student-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .student-management__student-dp {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      background-color: #eee;
    }

    .student-management__student-name {
      font-weight: 600;
    }

    .student-management__student-email {
      color: #666;
      font-size: 13px;
    }

    .student-management__actions {
      display: flex;
      gap: 10px;
    }

    .student-management__action-btn {
      cursor: pointer;
      font-size: 16px;
      background: none;
      border: none;
      padding: 5px;
    }

    .student-management__grid {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .student-management__card {
      background-color: var(--white);
      border-radius: 8px;
      box-shadow: var(--card-shadow);
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .student-management__card-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .student-management__card-dp {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      background-color: #eee;
    }

    .student-management__card-name {
      font-weight: 600;
      color: var(--primary-color);
    }

    .student-management__card-details {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 14px;
    }

    .student-management__card-email {
      color: #666;
      font-size: 13px;
      word-break: break-word;
    }

    .student-management__card-actions {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border-color);
    }

    @media (max-width: 768px) {
      .student-management__filters {
        flex-direction: column;
      }

      .student-management__table {
        display: none;
      }

      .student-management__grid {
        display: grid;
      }

      .student-management__view-toggle {
        display: none;
      }
    }

    @media (min-width: 769px) {
      .student-management__table {
        display: table;
      }

      .student-management__grid {
        display: none;
      }
    }
  </style>
</head>
<body>
    <div class="student-management">
        <div class="student-management__header">
            <h1 class="student-management__title">Student Management</h1>
            <p class="student-management__subtitle">View and manage all students</p>
        </div>
        
        <div class="student-management__filters">
            <div class="student-management__search">
                <input type="text" id="searchInput" class="student-management__search-input" placeholder="Search by name, roll number, email...">
            </div>
            
            <div class="student-management__filter-group">
                <label for="gradeFilter" class="student-management__filter-label">Grade</label>
                <select id="gradeFilter" class="student-management__filter-select">
                    <option value="all">All Grades</option>
                    <option value="8">Grade 8</option>
                    <option value="9">Grade 9</option>
                    <option value="10">Grade 10</option>
                    <option value="11">Grade 11</option>
                </select>
            </div>
            
            <div class="student-management__filter-group">
                <label for="sectionFilter" class="student-management__filter-label">Section</label>
                <select id="sectionFilter" class="student-management__filter-select">
                    <option value="all">All Sections</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                </select>
            </div>
            
            <div class="student-management__filter-group">
                <label for="genderFilter" class="student-management__filter-label">Gender</label>
                <select id="genderFilter" class="student-management__filter-select">
                    <option value="all">All Genders</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            
            <button class="student-management__reset-btn" id="resetFilters">Reset Filters</button>
        </div>
        
        <div class="student-management__controls">
            <div class="student-management__count" id="studentCount">Showing 6 of 6 students</div>
            
            <div class="student-management__view-toggle">
                <button class="student-management__view-btn student-management__view-btn--active" data-view="table">Table View</button>
                <button class="student-management__view-btn" data-view="grid">Grid View</button>
            </div>
        </div>
        
        <!-- Table View -->
        <table class="student-management__table" id="tableView">
            <thead>
                <tr>
                    <th>Student</th>
                    <th>Roll Number</th>
                    <th>Grade & Section</th>
                    <th>Gender</th>
                    <th>Parent</th>
                    <th>Contact</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Student data will be inserted here by JavaScript -->
            </tbody>
        </table>
        
        <!-- Grid View -->
        <div class="student-management__grid" id="gridView">
            <!-- Student cards will be inserted here by JavaScript -->
        </div>
    </div>

    <script>
        // Sample student data with profile pictures
        const students = [
            {
                name: "Sophia Williams",
                rollNumber: "S2023004",
                grade: "10",
                section: "C",
                gender: "Female",
                parent: "James Williams",
                contact: "9876543213",
                email: "james.williams@example.com",
                dob: "Nov 30, 2007",
                address: "101 Elm Street, Hamletville",
                dp: "https://randomuser.me/api/portraits/women/44.jpg"
            },
            {
                name: "Michael Davis",
                rollNumber: "S2023003",
                grade: "11",
                section: "A",
                gender: "Male",
                parent: "Thomas Davis",
                contact: "9876543212",
                email: "thomas.davis@example.com",
                dob: "Feb 10, 2006",
                address: "789 Pine Road, Villagetown",
                dp: "https://randomuser.me/api/portraits/men/32.jpg"
            },
            {
                name: "Daniel Brown",
                rollNumber: "S2023005",
                grade: "8",
                section: "A",
                gender: "Male",
                parent: "Lisa Brown",
                contact: "9876543214",
                email: "lisa.brown@example.com",
                dob: "Apr 5, 2009",
                address: "202 Maple Drive, Suburbsville",
                dp: "https://randomuser.me/api/portraits/men/75.jpg"
            },
            {
                name: "John Smith",
                rollNumber: "S2023001",
                grade: "10",
                section: "A",
                gender: "Male",
                parent: "Robert Smith",
                contact: "9876543210",
                email: "robert.smith@example.com",
                dob: "May 15, 2007",
                address: "123 Main Street, Cityville",
                dp: "https://randomuser.me/api/portraits/men/22.jpg"
            },
            {
                name: "Emily Johnson",
                rollNumber: "S2023002",
                grade: "9",
                section: "B",
                gender: "Female",
                parent: "Karen Johnson",
                contact: "9876543211",
                email: "karen.johnson@example.com",
                dob: "Mar 22, 2008",
                address: "456 Oak Avenue, Townsville",
                dp: "https://randomuser.me/api/portraits/women/33.jpg"
            },
            {
                name: "John Smith",
                rollNumber: "TU001",
                grade: "9",
                section: "A",
                gender: "Male",
                parent: "Robert Smith",
                contact: "555-123-4567",
                email: "john.smith@example.com",
                dob: "Jun 10, 2008",
                address: "123 Main Street, Cityville",
                dp: "https://randomuser.me/api/portraits/men/45.jpg"
            }
        ];

        // DOM elements
        const tableBody = document.getElementById('tableBody');
        const gridView = document.getElementById('gridView');
        const searchInput = document.getElementById('searchInput');
        const gradeFilter = document.getElementById('gradeFilter');
        const sectionFilter = document.getElementById('sectionFilter');
        const genderFilter = document.getElementById('genderFilter');
        const resetFiltersBtn = document.getElementById('resetFilters');
        const viewButtons = document.querySelectorAll('.student-management__view-btn');
        const studentCount = document.getElementById('studentCount');

        // Current filters
        let currentFilters = {
            grade: 'all',
            section: 'all',
            gender: 'all'
        };

        // Current view
        let currentView = 'table';

        // Initialize the page
        function init() {
            renderStudents(students);
            setupEventListeners();
            setCurrentView(currentView);
        }

        // Set up event listeners
        function setupEventListeners() {
            // Search input
            searchInput.addEventListener('input', handleSearch);
            
            // Filter dropdowns
            gradeFilter.addEventListener('change', () => {
                currentFilters.grade = gradeFilter.value;
                applyFilters();
            });
            
            sectionFilter.addEventListener('change', () => {
                currentFilters.section = sectionFilter.value;
                applyFilters();
            });
            
            genderFilter.addEventListener('change', () => {
                currentFilters.gender = genderFilter.value;
                applyFilters();
            });
            
            // Reset filters button
            resetFiltersBtn.addEventListener('click', resetFilters);
            
            // View buttons
            viewButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const view = button.dataset.view;
                    setCurrentView(view);
                });
            });
        }

        // Handle search input
        function handleSearch() {
            const searchTerm = searchInput.value.toLowerCase();
            applyFilters(searchTerm);
        }

        // Apply all filters
        function applyFilters(searchTerm = '') {
            let filteredStudents = [...students];
            
            // Apply search filter
            if (searchTerm) {
                filteredStudents = filteredStudents.filter(student => 
                    student.name.toLowerCase().includes(searchTerm) ||
                    student.rollNumber.toLowerCase().includes(searchTerm) ||
                    student.email.toLowerCase().includes(searchTerm)
                );
            }
            
            // Apply grade filter
            if (currentFilters.grade !== 'all') {
                filteredStudents = filteredStudents.filter(student => student.grade === currentFilters.grade);
            }
            
            // Apply section filter
            if (currentFilters.section !== 'all') {
                filteredStudents = filteredStudents.filter(student => student.section === currentFilters.section);
            }
            
            // Apply gender filter
            if (currentFilters.gender !== 'all') {
                filteredStudents = filteredStudents.filter(student => student.gender === currentFilters.gender);
            }
            
            // Render filtered students
            renderStudents(filteredStudents);
            
            // Update student count
            studentCount.textContent = `Showing ${filteredStudents.length} of ${students.length} students`;
        }

        // Reset all filters
        function resetFilters() {
            // Reset current filters
            currentFilters = {
                grade: 'all',
                section: 'all',
                gender: 'all'
            };
            
            // Reset form elements
            searchInput.value = '';
            gradeFilter.value = 'all';
            sectionFilter.value = 'all';
            genderFilter.value = 'all';
            
            // Render all students
            renderStudents(students);
            
            // Update student count
            studentCount.textContent = `Showing ${students.length} of ${students.length} students`;
        }

        // Set current view (table or grid)
        function setCurrentView(view) {
            currentView = view;
            
            // Update view buttons
            viewButtons.forEach(button => {
                if (button.dataset.view === view) {
                    button.classList.add('student-management__view-btn--active');
                } else {
                    button.classList.remove('student-management__view-btn--active');
                }
            });
            
            // Show/hide views
            if (view === 'table') {
                document.getElementById('tableView').style.display = 'table';
                document.getElementById('gridView').style.display = 'none';
            } else {
                document.getElementById('tableView').style.display = 'none';
                document.getElementById('gridView').style.display = 'grid';
            }
        }

        // Render students in both table and grid views
        function renderStudents(studentsToRender) {
            renderTableView(studentsToRender);
            renderGridView(studentsToRender);
        }

        // Render table view
        function renderTableView(studentsToRender) {
            tableBody.innerHTML = '';
            
            studentsToRender.forEach(student => {
                const row = document.createElement('tr');
                
                row.innerHTML = `
                    <td>
                        <div class="student-management__student-info">
                            <img src="${student.dp}" alt="${student.name}" class="student-management__student-dp">
                            <div>
                                <div class="student-management__student-name">${student.name}</div>
                                <div class="student-management__student-email">${student.email}</div>
                            </div>
                        </div>
                    </td>
                    <td>${student.rollNumber}</td>
                    <td>Grade ${student.grade} | ${student.section}</td>
                    <td>${student.gender}</td>
                    <td>${student.parent}</td>
                    <td>${student.contact}</td>
                    <td>
                        <div class="student-management__actions">
                            <button class="student-management__action-btn" title="Message">💬</button>
                            <button class="student-management__action-btn" title="Edit">✏️</button>
                            <button class="student-management__action-btn" title="Delete">🗑️</button>
                        </div>
                    </td>
                `;
                
                tableBody.appendChild(row);
            });
        }

        // Render grid view
        function renderGridView(studentsToRender) {
            gridView.innerHTML = '';
            
            studentsToRender.forEach(student => {
                const card = document.createElement('div');
                card.className = 'student-management__card';
                
                card.innerHTML = `
                    <div class="student-management__card-header">
                        <img src="${student.dp}" alt="${student.name}" class="student-management__card-dp">
                        <div>
                            <div class="student-management__card-name">${student.name}</div>
                            <div>${student.rollNumber}</div>
                        </div>
                    </div>
                    <div class="student-management__card-details">
                        <div>Grade ${student.grade} | Section ${student.section}</div>
                        <div>Gender: ${student.gender}</div>
                        <div>Parent: ${student.parent}</div>
                        <div>Contact: ${student.contact}</div>
                        <div class="student-management__card-email">${student.email}</div>
                    </div>
                    <div class="student-management__card-actions">
                        <button class="student-management__action-btn" title="Message">💬</button>
                        <button class="student-management__action-btn" title="Edit">✏️</button>
                        <button class="student-management__action-btn" title="Delete">🗑️</button>
                    </div>
                `;
                
                gridView.appendChild(card);
            });
        }

        // Initialize the application
        init();
    </script>
</body>
</html>
